<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="Bascet.css">
</head>
<body>
    <h1><div class="bascet">Корзина</div></h1>
    <a href="pizzeria.html" class="back-card">
        <div class="back"></div>
        <div class="back-text">Вернутся</div>
    </a>
    <div class="Selected-items">Выбранные позиции:</div>
    <div class="card1">
        <div class="card1-text">Пицца пепперони</div>
        <div class="card1-img"></div>
        <div class="Kol-vo"> - 1 шт.</div>
        <div style="font-size: 30px; position: absolute; top: 83%; left: 70%; color: white;">+</div>
    </div>
    <div class="card2">
        <div class="card2-text">Пицца пепперони</div>
        <div class="card2-img"></div>
        <div class="Kol-vo2"> - 1 шт.</div>
        <div style="font-size: 30px; position: absolute; top: 83%; left: 70%; color: white;">+</div>
    </div>
    <div class="Positions">
        <div class="Name">Наименование</div>
        <div class="Volume-Length">Обьем/Длина</div>
        <div class="kol-vo">Количество</div>
        <div class="price">Цена</div>
        <div class="name1">Пицца пеперони</div>
        <div class="volume-length1">30 См</div>
        <img src="pizzeria-foto/trash-2.png" alt="trash can" style="position: absolute; top: 15%; left: 62%; cursor: pointer;">
        <div class="kol-vo1"><div style="position: absolute; top: 0%; left: -30%; cursor: pointer;">-</div> 1 шт. <div style="position: absolute; top: 5%; left: 110%; cursor: pointer;">+</div></div>
        <div class="price1">400 Руб</div>
        <div class="name2">Кола обычная</div>
        <div class="volume-length2">500 Мл</div>
        <img src="pizzeria-foto/trash-2.png" alt="trash can" style="position: absolute; top: 25%; left: 62%; cursor: pointer;">
        <div class="kol-vo2"><div style="position: absolute; top: 0%; left: -30%; cursor: pointer;">-</div> 1 шт. <div style="position: absolute; top: 15%; left: 110%; cursor: pointer;">+</div></div>
        <div class="price2">150 Руб</div>
        <div class="promotional-code">Промокод</div>
        <input type="text" placeholder="Ввести..." class="promotional-code-input">
        <button class="promotional-code-button">Применить</button>
        <div class="Pizza-Coins">Pizza Coins</div>
        <div class="pizza-Coins">450 шт.</div>
        <div class="Write-off">Списать</div>
        <div class="Total">Итого:</div>
        <div class="total">550 Рублей</div>
        <button class="payment-button">Перейти к оплате</button>
    </div>
</body>
</html>
